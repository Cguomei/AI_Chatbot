<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能电商客服 - 测试界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        /* 标签页切换按钮 */
        .mode-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .mode-tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .mode-tab:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .mode-tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.bot .message-content {
            background: white;
            border-bottom-left-radius: 4px;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #userInput:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info-panel {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .typing-indicator {
            display: none;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 智能电商客服</h1>
            <p>有任何问题都可以问我哦~</p>
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('user')">用户</div>
                <div class="mode-tab" onclick="switchMode('service')">客服</div>
                <div class="mode-tab" onclick="switchMode('dev')">开发者</div>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-content">
                    您好！我是您的专属客服小助手，很高兴为您服务😊 请问有什么可以帮助您的？
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-row">
                <span>会话 ID: <strong id="sessionId">-</strong></span>
                <span>响应时间：<strong id="responseTime">-</strong></span>
            </div>
            <div class="info-row">
                <span>意图：<strong id="intentInfo">-</strong></span>
                <span>置信度：<strong id="confidenceInfo">-</strong></span>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let sessionId = null;
        const API_BASE_URL = 'http://localhost:8000/api';
        let currentMode = 'user';
        
        // 页面加载时生成 session ID
        window.onload = function() {
            sessionId = generateSessionId();
            document.getElementById('sessionId').textContent = sessionId;
        };
        
        function generateSessionId() {
            return 'user_' + Math.random().toString(36).substr(2, 9);
        }
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新标签页样式
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const infoPanel = document.querySelector('.info-panel');
            
            // 根据模式显示不同内容
            if (mode === 'user') {
                // 用户模式：隐藏 info-panel
                if (infoPanel) infoPanel.style.display = 'none';
            } else if (mode === 'service') {
                // 客服模式：显示基础 info-panel
                if (infoPanel) {
                    infoPanel.style.display = 'block';
                    infoPanel.innerHTML = `
                        <div class="info-row">
                            <span>会话 ID: <strong id="sessionId">-</strong></span>
                            <span>响应时间：<strong id="responseTime">-</strong></span>
                        </div>
                        <div class="info-row">
                            <span>意图：<strong id="intentInfo">-</strong></span>
                            <span>置信度：<strong id="confidenceInfo">-</strong></span>
                        </div>
                    `;
                }
                alert('💼 客服模式已启用！\n\n此模式下可以看到：\n• 会话 ID\n• 响应时间\n• 意图识别\n• 置信度');
            } else if (mode === 'dev') {
                // 开发者模式：显示完整调试信息
                if (infoPanel) {
                    infoPanel.style.display = 'block';
                    infoPanel.innerHTML = `
                        <div class="info-row">
                            <span> 会话 ID: <strong id="sessionId">-</strong></span>
                            <span>⏱️ 响应时间：<strong id="responseTime">-</strong></span>
                        </div>
                        <div class="info-row">
                            <span>🎯 意图：<strong id="intentInfo">-</strong></span>
                            <span>📊 置信度：<strong id="confidenceInfo">-</strong></span>
                        </div>
                        <div class="info-row">
                            <span>🔧 策略：<strong id="strategyInfo">-</strong></span>
                            <span>📝 原始意图：<strong id="rawIntent">-</strong></span>
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 8px; font-size: 12px;">
                            <strong>📋 完整响应数据：</strong>
                            <pre id="rawData" style="margin-top: 5px; color: #666; white-space: pre-wrap;">等待对话...</pre>
                        </div>
                    `;
                }
                alert('👨‍💻 开发者模式已启用！\n\n此模式下可以看到：\n• 完整的技术调试信息\n• 意图识别详情\n• 响应策略\n• 原始 API 数据');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息到聊天界面
            addMessage(message, 'user');
            input.value = '';
            
            // 显示正在输入提示
            showTyping();
            
            try {
                const startTime = Date.now();
                
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                // 隐藏正在输入提示
                hideTyping();
                
                // 添加机器人回复
                addMessage(data.response, 'bot');
                
                // 开发者模式：显示完整调试信息
                if (currentMode === 'dev') {
                    document.getElementById('sessionId').textContent = data.session_id;
                    document.getElementById('responseTime').textContent = data.processing_time;
                    document.getElementById('intentInfo').textContent = data.intent_cn;
                    document.getElementById('confidenceInfo').textContent = (data.confidence * 100).toFixed(1) + '%';
                    document.getElementById('strategyInfo').textContent = data.strategy;
                    document.getElementById('rawIntent').textContent = data.intent;
                    document.getElementById('rawData').textContent = JSON.stringify(data, null, 2);
                } else if (currentMode === 'service') {
                    // 客服模式：只显示基础信息
                    document.getElementById('sessionId').textContent = data.session_id;
                    document.getElementById('responseTime').textContent = data.processing_time;
                    document.getElementById('intentInfo').textContent = data.intent_cn;
                    document.getElementById('confidenceInfo').textContent = (data.confidence * 100).toFixed(1) + '%';
                }
                
            } catch (error) {
                hideTyping();
                addMessage('抱歉，系统出现错误，请稍后再试~', 'bot');
                console.error('Error:', error);
            }
        }
        
        function addMessage(text, type) {
            const container = document.getElementById('chatContainer');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            container.insertBefore(messageDiv, typingIndicator);
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'block';
        }
        
        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'none';
        }
    </script>
</body>
</html>
